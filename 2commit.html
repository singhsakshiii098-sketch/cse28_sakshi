<!DOCTYPE html>
<html>
<head>
    <title>My Website</title>
    <link rel="stylesheet" href="index.css">
    <style>
        body{
    margin:0;
    font-family:Arial, sans-serif;
}

/* Header */
.header{
    background:#2d7be5;
    color:white;
    text-align:center;
    padding:25px;
    font-size:25px;
}

/* Navbar */
.navbar{
    background:#222;
    color:white;
    display:flex;
    justify-content:space-between;
    padding:10px 20px;
    font-size:20px;
}

.navbar a{
    color:white;
    text-decoration:none;
    margin-left:15px;
}

/* Container */
.container{
    display:flex;
    padding:40px;
    background:#eee;
}

/* Columns */
.column{
    flex:1;
    padding:20px;
}

/* Footer */
.footer{
    background:#333;
    color:white;
    text-align:center;
    padding:15px;
}
    </style>
</head>

<body>

<!-- Header -->
<div class="header">
    <h1>CodeHub</h1>
</div>

<!-- Navigation Bar -->
<div class="navbar">

    <div class="logo">
        Website
    </div>

    <div class="menu">
<a href="#">Home</a>
<a href="#">About</a>
<a href="#">Services</a>
<a href="#">Gallery</a>
<a href="#">Blog</a>
<a href="#">Contact</a>
</div>

</div>

<!-- Content -->
<div class="container">

    <div class="column">
        <h2>Column 1</h2>

        <p>
            This is the first column.
            Responsive layout using Bootstrap grid concepts.
        </p>
    </div>

    <div class="column">
        <h2>Column 2</h2>

        <p>
            Bootstrap grid system helps create responsive layouts.
        </p>
    </div>

</div>

<!-- Footer -->
<div class="footer">
    Copyright © 2026 My Website
</div>

</body>
</html>
